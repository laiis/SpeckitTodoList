<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理員儀表板 - SpeckitTodoList</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --min-width: 1200px;
            --ratio-user: 2;
            --ratio-log: 3;
        }
        body.admin-page {
            overflow: auto !important;
            display: block !important;
        }
        .admin-wrapper {
            min-width: var(--min-width);
            overflow-x: auto;
            min-height: 100vh;
            background: var(--bg-gradient);
        }
        /* 自定義捲動條 - 橫向 */
        .admin-wrapper::-webkit-scrollbar {
            height: 10px;
        }
        .admin-wrapper::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
        }
        .admin-wrapper::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.3);
            border-radius: 10px;
        }
        .admin-wrapper::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.5);
        }

        .admin-container {
            width: 100%;
            margin: 40px auto;
            padding: 0 40px;
            box-sizing: border-box;
        }
        .admin-main {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        .user-mgmt {
            flex: var(--ratio-user);
        }
        .sys-logs {
            flex: var(--ratio-log);
        }
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 20px 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-effect));
            -webkit-backdrop-filter: blur(var(--blur-effect));
            border-bottom: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .section {
            margin-bottom: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-effect));
            -webkit-backdrop-filter: blur(var(--blur-effect));
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            text-align: left;
            padding: 14px;
            border-bottom: 1px solid var(--glass-border);
            color: var(--text-main);
        }
        th {
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
        .log-entry {
            font-family: monospace;
            font-size: 0.9em;
            padding: 8px 0;
            border-bottom: 1px dashed var(--glass-border);
            color: var(--text-main);
        }
        .level-security { color: #ef4444; font-weight: 600; }
        .level-info { color: #10b981; }
        .level-error { color: #f87171; }
        .badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            color: white;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-admin { background: #6366f1; }
        .badge-editor { background: #10b981; }
        .badge-viewer { background: #94a3b8; }
        .btn-sm {
            padding: 6px 10px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            margin-right: 5px;
            transition: all 0.2s ease;
        }
        .btn-sm:hover {
            transform: translateY(-1px);
            filter: brightness(1.1);
        }
        .btn-unlock { background: #f59e0b; color: white; }
        .btn-reset { background: #6366f1; color: white; }
        
        select {
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid var(--glass-border);
            background: var(--input-bg);
            color: var(--text-main);
            outline: none;
        }
    </style>
</head>
<body class="admin-page">
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="admin-wrapper">
        <header class="sticky-header">
            <h1>管理員儀表板</h1>
            <a href="../index.html" class="glass" style="padding: 10px 20px; text-decoration: none; color: inherit; border-radius: 8px;">返回首頁</a>
        </header>

        <div class="admin-container">
            <main class="admin-main">
                <div class="section glass user-mgmt">
                    <h2>使用者管理</h2>
                    <table id="users-table">
                        <thead>
                            <tr>
                                <th>使用者名稱</th>
                                <th>角色</th>
                                <th>狀態</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="users-list">
                            <!-- 使用者資料將在此插入 -->
                        </tbody>
                    </table>
                </div>

                <div class="section glass sys-logs">
                    <h2>系統安全日誌</h2>
                    <div id="logs-container">
                        <!-- 日誌將在此插入 -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script type="module">
        import { authService } from '../services/auth.js';

        async function checkAdmin() {
            try {
                const resp = await authService.getMe();
                if (!resp.ok) {
                    window.location.href = 'login.html';
                    return;
                }
                const user = await resp.json();
                if (user.role !== 'admin') {
                    alert('權限不足，將返回首頁');
                    window.location.href = '../index.html';
                }
            } catch (e) {
                window.location.href = 'login.html';
            }
        }

        async function loadUsers() {
            const resp = await fetch('/api/admin/users');
            if (resp.ok) {
                const users = await resp.json();
                const list = document.getElementById('users-list');
                list.innerHTML = users.map(user => `
                    <tr>
                        <td>${user.username}</td>
                        <td><span class="badge badge-${user.role}">${user.role}</span></td>
                        <td>${user.locked_until ? `<span style="color:red">鎖定中 (至 ${new Date(user.locked_until).toLocaleString()})</span>` : '正常'}</td>
                        <td>
                            ${user.locked_until ? `<button class="btn-sm btn-unlock" onclick="unlockUser(${user.id})">手動解鎖</button>` : ''}
                            <button class="btn-sm btn-reset" onclick="resetPassword(${user.id}, '${user.username}')">重設密碼</button>
                            <select onchange="updateRole(${user.id}, this.value)">
                                <option value="1" ${user.role_id === 1 ? 'selected' : ''}>Admin</option>
                                <option value="2" ${user.role_id === 2 ? 'selected' : ''}>Editor</option>
                                <option value="3" ${user.role_id === 3 ? 'selected' : ''}>Viewer</option>
                            </select>
                        </td>
                    </tr>
                `).join('');
            }
        }

        async function loadLogs() {
            const resp = await fetch('/api/admin/logs');
            if (resp.ok) {
                const logs = await resp.json();
                const container = document.getElementById('logs-container');
                container.innerHTML = logs.map(log => `
                    <div class="log-entry">
                        <span style="color: #747d8c">[${log.timestamp || ''}]</span>
                        <span class="level-${log.level ? log.level.toLowerCase() : 'info'}">[${log.level || 'INFO'}]</span>
                        ${log.message}
                    </div>
                `).join('');
            }
        }

        window.unlockUser = async (id) => {
            if (confirm('確定要解鎖此使用者嗎？')) {
                const resp = await fetch(`/api/admin/users/${id}/unlock`, { method: 'POST' });
                if (resp.ok) {
                    alert('已解鎖');
                    loadUsers();
                }
            }
        };

        window.resetPassword = async (id, username) => {
            const newPassword = prompt(`請輸入 ${username} 的新密碼:`);
            if (newPassword) {
                const resp = await fetch(`/api/admin/users/${id}/password-reset`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ newPassword })
                });
                if (resp.ok) alert('密碼已重設');
            }
        };

        window.updateRole = async (id, roleId) => {
            const resp = await fetch(`/api/admin/users/${id}/role`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ roleId: parseInt(roleId) })
            });
            if (resp.ok) {
                alert('角色已更新');
                loadUsers();
            }
        };

        document.addEventListener('DOMContentLoaded', async () => {
            await checkAdmin();
            loadUsers();
            loadLogs();
            // 每 30 秒自動重新整理日誌
            setInterval(loadLogs, 30000);
        });
    </script>
</body>
</html>
